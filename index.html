<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>News App</h2>

<!-- Tabs -->
<div class="tabs">
  <button class="active" onclick="showTab('images')">Images</button>
  <button onclick="showTab('videos')">Videos</button>
  <button onclick="showTab('major')">Favorites</button>
  <button onclick="showTab('chat')">Chat</button>
</div>

<!-- Upload -->
<div class="upload">
  <input id="title" placeholder="Title">
  <input id="desc" placeholder="Description">
  <input id="url" placeholder="Image or Video URL">

  <button onclick="addPost('image')">Add Image</button>
  <button onclick="addPost('video')">Add Video</button>
</div>

<!-- Sections -->
<div id="images" class="tab active"></div>
<div id="videos" class="tab"></div>
<div id="major" class="tab"></div>
<div id="chat" class="tab"></div>

<a href="about.html">About</a>

</div>

<script src="script.js"></script>
</body>
</html>
