<!DOCTYPE html><html lang="ps">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Web App</title>
<style>
body{font-family:sans-serif;margin:0;background:#f4f4f4;}
header{background:#222;color:#fff;padding:15px;text-align:center;}
.container{max-width:900px;margin:auto;padding:10px;}
.card{background:#fff;padding:10px;margin:10px 0;border-radius:10px;}
input,textarea{width:100%;padding:8px;margin:5px 0;}
button{padding:8px 12px;margin:5px;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
img{max-width:100%;border-radius:10px;}
.small{font-size:12px;color:#555;}
.actions{margin-top:5px;}
</style>
</head>
<body>
<header>
<h2>My Simple Web App</h2>
</header><div class="container"><!-- POSTS --><div class="card">
<h3>1 - Posts (Text + Image URL)</h3>
<input id="postTitle" placeholder="Title" />
<textarea id="postDesc" placeholder="Description"></textarea>
<input id="postImg" placeholder="Image URL" />
<button onclick="addPost()">Add Post</button>
</div><div id="posts"></div><!-- GALLERY --><div class="card">
<h3>2 - Gallery (Images)</h3>
<input id="imgUrl" placeholder="Image URL" />
<button onclick="addImage()">Add Image</button>
</div>
<div id="gallery" class="grid"></div><!-- VIDEOS --><div class="card">
<h3>3 - Videos (YouTube Link)</h3>
<input id="videoTitle" placeholder="Video Title" />
<input id="videoUrl" placeholder="YouTube Embed URL (https://www.youtube.com/embed/ID)" />
<textarea id="videoDesc" placeholder="Description"></textarea>
<button onclick="addVideo()">Add Video</button>
</div>
<div id="videos"></div></div><script>
let posts = [];
let images = [];
let videos = [];

function render(){
  document.getElementById("posts").innerHTML = posts.map((p,i)=>`
    <div class='card'>
      <h4>${p.title}</h4>
      <p>${p.desc}</p>
      ${p.img ? `<img src="${p.img}"/>` : ""}
      <div class='actions'>
        <button onclick="deletePost(${i})">Delete</button>
      </div>
    </div>
  `).join("");

  document.getElementById("gallery").innerHTML = images.map((img,i)=>`
    <div>
      <img src="${img}"/>
      <button onclick="deleteImage(${i})">Delete</button>
    </div>
  `).join("");

  document.getElementById("videos").innerHTML = videos.map((v,i)=>`
    <div class='card'>
      <h4>${v.title}</h4>
      <p class='small'>${v.desc}</p>
      <iframe width="100%" height="200" src="${v.url}" allowfullscreen></iframe>
      <button onclick="deleteVideo(${i})">Delete</button>
    </div>
  `).join("");
}

function addPost(){
  posts.push({
    title: postTitle.value,
    desc: postDesc.value,
    img: postImg.value
  });
  render();
}
function deletePost(i){posts.splice(i,1);render();}

function addImage(){images.push(imgUrl.value);render();}
function deleteImage(i){images.splice(i,1);render();}

function addVideo(){
  videos.push({
    title: videoTitle.value,
    url: videoUrl.value,
    desc: videoDesc.value
  });
  render();
}
function deleteVideo(i){videos.splice(i,1);render();}

render();
</script></body>
</html>
