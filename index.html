<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All News</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app">

  <!-- Header -->
  <header>
    <button onclick="history.back()">←</button>
    <h2>All News</h2>
    <button>🔖</button>
  </header>

  <!-- Search -->
  <input type="text" id="search" placeholder="Search news...">

  <!-- Tabs -->
  <div class="tabs">
    <button onclick="filterNews('new')">New</button>
    <button onclick="filterNews('major')">Major</button>
    <button onclick="filterNews('chat')">Chat</button>
  </div>

  <!-- News List -->
  <div id="newsList"></div>

</div>

<script src="js/app.js"></script>
</body>
</html>
