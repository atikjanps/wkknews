<!DOCTYPE html>
<html>
<head>
  <title>News App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Mini Social News App</h2>

<!-- 🧾 UPLOAD PANEL -->
<div class="box">

  <select id="type">
    <option value="article">Article</option>
    <option value="video">Video</option>
  </select>

  <input id="title" placeholder="Title">

  <input id="media" placeholder="Image or Video Link">

  <textarea id="desc" placeholder="Description"></textarea>

  <button onclick="addPost()">Upload</button>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('articles')">Articles</button>
  <button onclick="show('foryou')">For You ⭐</button>
  <button onclick="show('videos')">Videos</button>
</div>

<!-- PAGES -->
<div id="articles" class="page"></div>
<div id="foryou" class="page active"></div>
<div id="videos" class="page"></div>

<script src="script.js"></script>
</body>
</html>
